<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz Website - Quiz</title>
    <!-- CSS linked here -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Fixed quiz header (stays visible while scrolling) -->
    <header class="quiz-topbar" aria-label="Quiz controls">
        <div class="quiz-topbar-inner">
            <div class="quiz-topbar-left">
                <h1 id="quiz-title" class="quiz-topbar-title">Online Quiz Website</h1>
                <p class="quiz-topbar-meta" aria-live="polite">
                    <span id="current-question">1</span> / <span id="total-questions">10</span>
                    <span class="quiz-topbar-sep" aria-hidden="true">•</span>
                    <span id="quiz-timer" aria-label="Timer">00:00</span>
                </p>
            </div>

            <div class="quiz-topbar-right">
                <button id="exit-quiz-btn" class="exit-quiz-btn" type="button">Exit Quiz</button>
            </div>
        </div>
    </header>

    <main class="container quiz-layout">
        <!-- Question Palette (Navigation Panel) -->
        <aside class="question-palette" aria-label="Question navigation">
            <h2 class="palette-title">Questions</h2>
            <div class="palette-grid" id="palette-grid" role="group" aria-label="Question buttons">
                <!-- Numbered buttons will be generated by quiz.js -->
            </div>
            <div class="palette-legend">
                <div class="legend-item">
                    <span class="legend-dot legend-dot--current"></span>
                    <span>Current</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot legend-dot--answered"></span>
                    <span>Answered</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot legend-dot--skipped"></span>
                    <span>Skipped</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot legend-dot--unanswered"></span>
                    <span>Not Visited</span>
                </div>
            </div>
        </aside>

        <!-- Quiz Content -->
        <section class="quiz-box" aria-labelledby="quiz-title">
            <!-- Question Section -->
            <article class="question-section">
                <h3 class="question-text" id="question-text">What is the capital of France?</h3>
            </article>

            <!-- Options Section -->
            <div class="options-container" id="options-container" role="group" aria-labelledby="question-text">
                <button class="option-btn" type="button">Paris</button>
                <button class="option-btn" type="button">London</button>
                <button class="option-btn" type="button">Berlin</button>
                <button class="option-btn" type="button">Madrid</button>
            </div>

            <!-- Quiz Actions -->
            <div class="quiz-footer">
                <button class="skip-btn" id="skip-btn" type="button">Skip</button>
                <button class="next-btn" id="next-btn" type="button">Next</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Online Quiz Website. All rights reserved.</p>
    </footer>

    <!-- JavaScript files linked here -->
    <script src="js/questions.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
