<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz Website - Results</title>
    <!-- CSS linked here -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <section class="result-box" aria-labelledby="result-title">
            <!-- Result Header -->
            <header class="result-header">
                <h2 id="result-title" class="result-title">Quiz Completed!</h2>
                <p class="result-subtitle">Here are your results</p>
            </header>

            <!-- Score Display -->
            <article class="score-section" aria-label="Your score">
                <div class="score-circle" role="img" aria-label="Score badge">
                    <p class="score-percentage" id="score-percentage" aria-live="polite">80%</p>
                </div>
            </article>

            <!-- Result Details -->
            <div class="result-details" role="region" aria-label="Quiz statistics">
                <div class="detail-item">
                    <p class="detail-label">Total Questions</p>
                    <p class="detail-value" id="total-questions">10</p>
                </div>
                <div class="detail-item">
                    <p class="detail-label">Time Taken</p>
                    <p class="detail-value" id="quiz-time">00:00</p>
                </div>
                <div class="detail-item">
                    <p class="detail-label">Correct Answers</p>
                    <p class="detail-value correct" id="correct-answers">8</p>
                </div>
                <div class="detail-item">
                    <p class="detail-label">Wrong Answers</p>
                    <p class="detail-value incorrect" id="wrong-answers">2</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="result-footer">
                <a href="quiz.html" class="restart-btn" role="button">Restart Quiz</a>
                <a href="index.html" class="home-btn" role="button">Go Home</a>
            </div>

            <!-- Answer Review Section -->
            <section class="review-section" aria-label="Answer review">
                <h3 class="review-title">Answer Review</h3>
                <div class="review-list" id="review-list">
                    <!-- Review items will be generated by result.js -->
                </div>
            </section>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Online Quiz Website. All rights reserved.</p>
    </footer>

    <!-- JavaScript files linked here -->
    <script src="js/questions.js"></script>
    <script src="js/result.js"></script>
</body>
</html>
